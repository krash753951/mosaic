<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mosaic">
<meta name="theme-color" content="#111111">
<title>Mosaic</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #111111;
  --purple: #AFA9EC;
  --purple-dim: rgba(175,169,236,0.15);
  --purple-border: rgba(175,169,236,0.35);
  --red: #C94F2A; --red-bg: #FAF0ED; --red-text: #8A3018;
  --orange: #D98B1A; --orange-bg: #FAF3E5; --orange-text: #7A4E08;
  --green: #5A8F1A; --green-bg: #EEF5E3; --green-text: #345209;
  --bg: #F6F5F2; --card: #FFFFFF;
  --border: rgba(0,0,0,0.09); --text: #1a1a1a; --muted: #999990;
  --radius: 14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: -webkit-fill-available; overscroll-behavior: none; }

/* TOPBAR */
.topbar { background: var(--black); padding: calc(var(--safe-top) + 16px) 18px 12px; position: sticky; top: 0; z-index: 100; overflow: hidden; }
.topbar::before { content:''; position:absolute; inset:0; background-image:radial-gradient(circle,rgba(175,169,236,0.1) 1px,transparent 1px); background-size:18px 18px; pointer-events:none; }
.topbar::after { content:''; position:absolute; bottom:-30px; left:-20px; width:200px; height:80px; background:radial-gradient(ellipse,rgba(175,169,236,0.18) 0%,transparent 70%); pointer-events:none; }
.topbar-row { display:flex; align-items:center; justify-content:space-between; position:relative; }
.topbar-brand { display:flex; align-items:center; gap:12px; }
.mosaic-icon { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; width:34px; height:34px; flex-shrink:0; }
.mosaic-icon span { border-radius:3px; display:block; background:var(--purple); }
.mi-1{opacity:1}.mi-2{opacity:.5}.mi-3{opacity:.2}.mi-4{opacity:.65}.mi-5{opacity:1}.mi-6{opacity:.35}.mi-7{opacity:.25}.mi-8{opacity:.55}.mi-9{opacity:.85}
.app-name { font-family:'DM Mono',monospace; color:var(--purple); font-size:20px; font-weight:500; letter-spacing:1px; }
.app-by { color:rgba(175,169,236,0.4); font-size:9px; letter-spacing:2px; text-transform:uppercase; margin-top:1px; }

/* filaments */
.filaments { flex:1; margin:0 10px; overflow:hidden; height:34px; opacity:0.5; }

.topbar-btn { background:var(--purple-dim); border:1px solid var(--purple-border); border-radius:20px; color:var(--purple); font-size:13px; font-family:'DM Sans',sans-serif; padding:7px 14px; cursor:pointer; display:flex; align-items:center; gap:5px; position:relative; }
.topbar-btn svg { width:15px; height:15px; }

/* hint */
.hint-bar { background: rgba(175,169,236,0.08); padding: 7px 16px; font-size: 11px; color: var(--muted); text-align: center; border-bottom: 1px solid var(--border); }

/* FILTERS */
.filters { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; scrollbar-width:none; background:var(--bg); border-bottom:1px solid var(--border); }
.filters::-webkit-scrollbar { display:none; }
.chip { font-size:13px; font-family:'DM Sans',sans-serif; padding:6px 16px; border-radius:20px; border:1px solid var(--border); color:var(--muted); background:var(--card); white-space:nowrap; cursor:pointer; }
.chip.active { background:var(--black); color:var(--purple); border-color:var(--black); }

/* TASK LIST */
.task-list { padding:14px 14px; display:flex; flex-direction:column; gap:12px; padding-bottom:calc(var(--safe-bottom) + 30px); }
.empty { text-align:center; color:var(--muted); font-size:14px; padding:3rem 0; }

/* CARD WRAPPER (per swipe) */
.card-wrap { position:relative; border-radius:var(--radius); overflow:hidden; }

/* delete panel — slide in da destra */
.del-panel { position:absolute; top:0; right:0; height:100%; width:100%; background:var(--red-bg); border:2px solid var(--red); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; gap:12px; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.card-wrap.confirming .del-panel { opacity:1; pointer-events:all; }
.del-panel-text { font-size:14px; color:var(--red-text); font-weight:500; }
.del-yes { background:var(--red); color:white; border:none; border-radius:10px; padding:10px 20px; font-size:14px; font-family:'DM Sans',sans-serif; font-weight:500; }
.del-no { background:white; color:var(--muted); border:1px solid var(--border); border-radius:10px; padding:10px 16px; font-size:14px; font-family:'DM Sans',sans-serif; }

/* CARD */
.task-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; border-left:4px solid var(--border); transition:opacity 0.25s, transform 0.25s; position:relative; }
.task-card.p1 { border-left-color:var(--red); }
.task-card.p2 { border-left-color:var(--orange); }
.task-card.p3 { border-left-color:var(--green); }
.client { font-size:11px; font-weight:700; color:var(--text); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:5px; }
.action { font-size:16px; color:var(--text); line-height:1.35; margin-bottom:10px; }
.card-footer { display:flex; align-items:center; justify-content:space-between; }
.date-label { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:4px; }
.date-label svg { width:13px; height:13px; }
.badge { font-size:11px; font-family:'DM Mono',monospace; font-weight:500; padding:3px 10px; border-radius:8px; }
.badge.p1{background:var(--red-bg);color:var(--red-text)}.badge.p2{background:var(--orange-bg);color:var(--orange-text)}.badge.p3{background:var(--green-bg);color:var(--green-text)}

/* ADD SHEET */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:flex-end; justify-content:center; }
.overlay.open { display:flex; }
.sheet { background:var(--card); border-radius:20px 20px 0 0; padding:20px 20px calc(var(--safe-bottom) + 24px); width:100%; max-width:480px; animation:slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
.sheet-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 18px; }
.sheet-title { font-size:16px; font-weight:500; color:var(--text); margin-bottom:16px; }
label { font-size:12px; color:var(--muted); display:block; margin-bottom:5px; font-weight:500; }
input[type=text],input[type=date],select { width:100%; padding:11px 12px; border:1px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text); background:var(--bg); margin-bottom:12px; -webkit-appearance:none; outline:none; }
input:focus,select:focus { border-color:var(--purple); }
.btn-primary { width:100%; background:var(--black); color:var(--purple); border:none; border-radius:12px; padding:15px; font-size:15px; font-family:'DM Sans',sans-serif; font-weight:500; cursor:pointer; margin-top:4px; }
.btn-cancel { width:100%; background:var(--bg); color:var(--muted); border:1px solid var(--border); border-radius:12px; padding:14px; font-size:15px; font-family:'DM Sans',sans-serif; cursor:pointer; margin-top:8px; }

/* TOAST */
.toast { position:fixed; bottom:calc(var(--safe-bottom)+20px); left:50%; transform:translateX(-50%) translateY(80px); background:var(--black); color:var(--purple); font-size:13px; padding:10px 20px; border-radius:20px; white-space:nowrap; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index:999; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div class="topbar-brand">
      <div class="mosaic-icon">
        <span class="mi-1"></span><span class="mi-2"></span><span class="mi-3"></span>
        <span class="mi-4"></span><span class="mi-5"></span><span class="mi-6"></span>
        <span class="mi-7"></span><span class="mi-8"></span><span class="mi-9"></span>
      </div>
      <div>
        <div class="app-name">Mosaic</div>
        <div class="app-by">by G. Dimaria</div>
      </div>
    </div>
    <svg class="filaments" viewBox="0 0 160 34" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="fg1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#AFA9EC" stop-opacity="0"/><stop offset="25%" stop-color="#AFA9EC" stop-opacity="0.9"/><stop offset="100%" stop-color="#AFA9EC" stop-opacity="0.25"/></linearGradient>
        <linearGradient id="fg2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#AFA9EC" stop-opacity="0"/><stop offset="35%" stop-color="#AFA9EC" stop-opacity="0.6"/><stop offset="100%" stop-color="#AFA9EC" stop-opacity="0.15"/></linearGradient>
        <linearGradient id="fg3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#AFA9EC" stop-opacity="0"/><stop offset="45%" stop-color="#AFA9EC" stop-opacity="0.35"/><stop offset="100%" stop-color="#AFA9EC" stop-opacity="0.08"/></linearGradient>
      </defs>
      <path d="M0,17 C28,4 52,30 80,15 C108,2 135,24 160,16" stroke="url(#fg1)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M0,11 C22,24 55,6 85,19 C115,32 142,9 160,13" stroke="url(#fg2)" stroke-width="1.0" fill="none" stroke-linecap="round"/>
      <path d="M0,24 C18,11 46,28 76,18 C106,8 132,26 160,21" stroke="url(#fg2)" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <path d="M0,7 C32,18 58,2 90,13 C122,24 146,6 160,9" stroke="url(#fg3)" stroke-width="0.6" fill="none" stroke-linecap="round"/>
      <path d="M0,28 C26,16 54,32 84,22 C114,12 138,28 160,26" stroke="url(#fg3)" stroke-width="0.5" fill="none" stroke-linecap="round"/>
      <path d="M0,14 C35,26 62,8 92,20 C122,32 148,14 160,16" stroke="url(#fg3)" stroke-width="0.4" fill="none" stroke-linecap="round"/>
      <path d="M0,21 C30,8 58,28 88,16 C118,4 144,20 160,19" stroke="url(#fg3)" stroke-width="0.35" fill="none" stroke-linecap="round"/>
      <path d="M0,5 C38,14 65,1 95,11 C125,21 148,4 160,7" stroke="url(#fg3)" stroke-width="0.3" fill="none" stroke-linecap="round"/>
    </svg>
    <button class="topbar-btn" id="emailBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
    </button>
  </div>
</div>

<div class="hint-bar">Tieni premuto su una card per eliminarla</div>

<div class="filters">
  <span class="chip active" id="chip-tutti">Tutti</span>
  <span class="chip" id="chip-p1">1</span>
  <span class="chip" id="chip-p2">2</span>
  <span class="chip" id="chip-p3">3</span>
  <span class="chip" id="chip-oggi">Oggi</span>
</div>

<div class="task-list" id="taskList"></div>

<div class="overlay" id="addOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Nuovo task</div>
    <label>Cliente</label><input type="text" id="newClient" placeholder="Nome cliente" autocomplete="off">
    <label>Azione</label><input type="text" id="newAction" placeholder="Es. Inviare preventivo" autocomplete="off">
    <label>Scadenza</label><input type="date" id="newDate">
    <label>Priorità</label>
    <select id="newPriority">
      <option value="p1">1 — Alta</option>
      <option value="p2" selected>2 — Media</option>
      <option value="p3">3 — Base</option>
    </select>
    <button class="btn-primary" id="addBtn">Aggiungi</button>
    <button class="btn-cancel" id="cancelBtn">Annulla</button>
  </div>
</div>

<div class="toast" id="toast">✓ Email aperta nel client di posta</div>

<script>
const SK = 'mosaic_tasks';
let tasks = JSON.parse(localStorage.getItem(SK) || 'null') || [
  {id:1,client:'Francoli Spa',action:'Inviare preventivo impianto',date:'2026-06-06',priority:'p1'},
  {id:2,client:'Radici Group',action:'Richiamare per conferma ordine',date:'2026-06-04',priority:'p1'},
  {id:3,client:'GR Stampi',action:'Spedire documentazione fiscale',date:'2026-06-07',priority:'p2'},
  {id:4,client:'Fandis Srl',action:'Inviare fattura n.112',date:'2026-06-05',priority:'p2'},
  {id:5,client:'Markem-Imaje',action:'Riconciliazione bancaria',date:'2026-06-03',priority:'p3'},
];
let nextId = tasks.reduce((m,t)=>Math.max(m,t.id),0)+1;
let filter = 'tutti';
const save = () => localStorage.setItem(SK, JSON.stringify(tasks));

function fmt(d) {
  if(!d) return '';
  const t=new Date(d+'T00:00:00'), now=new Date(); now.setHours(0,0,0,0);
  const diff=Math.round((t-now)/86400000);
  return diff===0?'Oggi':diff===1?'Domani':diff===-1?'Ieri':diff<0?Math.abs(diff)+'gg fa':'fra '+diff+'gg';
}

const badgeL={p1:'1',p2:'2',p3:'3'};

function getFiltered() {
  const now=new Date(); now.setHours(0,0,0,0);
  return tasks.filter(t=>{
    if(filter==='oggi'){const d=new Date(t.date+'T00:00:00');return d.getTime()===now.getTime();}
    return filter==='tutti'||t.priority===filter;
  });
}

function deleteTask(id) {
  const wrap = document.getElementById('w'+id);
  if(wrap){wrap.style.transition='all 0.25s';wrap.style.opacity='0';wrap.style.transform='translateX(-30px)';}
  setTimeout(()=>{tasks=tasks.filter(t=>t.id!==id);save();render();},250);
}

function closeAllConfirm() {
  document.querySelectorAll('.card-wrap.confirming').forEach(w=>w.classList.remove('confirming'));
}

function render() {
  const list = document.getElementById('taskList');
  const filtered = getFiltered();

  // update chips
  ['tutti','p1','p2','p3','oggi'].forEach(f=>{
    document.getElementById('chip-'+f).classList.toggle('active', f===filter);
  });

  if(!filtered.length){list.innerHTML='<p class="empty">Nessun task</p>';return;}

  list.innerHTML = filtered.map(t=>`
    <div class="card-wrap" id="w${t.id}">
      <div class="del-panel" id="dp${t.id}">
        <span class="del-panel-text">Eliminare?</span>
        <button class="del-yes" id="yes${t.id}">Sì</button>
        <button class="del-no" id="no${t.id}">No</button>
      </div>
      <div class="task-card ${t.priority}" id="c${t.id}">
        <div class="client">${t.client}</div>
        <div class="action">${t.action}</div>
        <div class="card-footer">
          <span class="date-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            ${fmt(t.date)}
          </span>
          <span class="badge ${t.priority}">${badgeL[t.priority]}</span>
        </div>
      </div>
    </div>
  `).join('');

  // bind eventi direttamente sui nodi — metodo più affidabile su iOS
  filtered.forEach(t=>{
    const wrap = document.getElementById('w'+t.id);
    const card = document.getElementById('c'+t.id);
    const yes  = document.getElementById('yes'+t.id);
    const no   = document.getElementById('no'+t.id);

    // long press sulla card
    let pressTimer = null;
    card.addEventListener('touchstart', function(e){
      pressTimer = setTimeout(function(){
        closeAllConfirm();
        wrap.classList.add('confirming');
      }, 500);
    }, {passive:true});
    card.addEventListener('touchend', function(){ clearTimeout(pressTimer); }, {passive:true});
    card.addEventListener('touchmove', function(){ clearTimeout(pressTimer); }, {passive:true});

    // fallback doppio tap
    let lastTap = 0;
    card.addEventListener('touchend', function(e){
      const now = Date.now();
      if(now - lastTap < 400){
        clearTimeout(pressTimer);
        closeAllConfirm();
        wrap.classList.add('confirming');
      }
      lastTap = now;
    }, {passive:true});

    // Sì — elimina
    yes.addEventListener('touchend', function(e){
      e.stopPropagation();
      deleteTask(t.id);
    }, {passive:true});
    yes.addEventListener('click', function(e){
      e.stopPropagation();
      deleteTask(t.id);
    });

    // No — annulla
    no.addEventListener('touchend', function(e){
      e.stopPropagation();
      wrap.classList.remove('confirming');
    }, {passive:true});
    no.addEventListener('click', function(e){
      e.stopPropagation();
      wrap.classList.remove('confirming');
    });
  });
}

// filtri
['tutti','p1','p2','p3','oggi'].forEach(f=>{
  document.getElementById('chip-'+f).addEventListener('click', function(){
    filter=f; closeAllConfirm(); render();
  });
});

// email
document.getElementById('emailBtn').addEventListener('click', function(){
  const now=new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
  let body=`Report Mosaic — ${now}\n\n`;
  ['p1','p2','p3'].forEach(p=>{
    const g=tasks.filter(t=>t.priority===p);
    const ico=p==='p1'?'🔴':p==='p2'?'🟠':'🟢';
    if(g.length){body+=`${ico} PRIORITÀ ${p[1]} (${g.length})\n`;g.forEach(t=>body+=`  • [${t.client}] ${t.action} — ${fmt(t.date)}\n`);body+='\n';}
  });
  body+=`—\nInviato da Mosaic by G. Dimaria`;
  window.location.href=`mailto:giuseppe@dimaria.net?subject=${encodeURIComponent('Mosaic — Report task '+now)}&body=${encodeURIComponent(body)}`;
  const toast=document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),3000);
});

// add sheet
document.getElementById('addBtn').addEventListener('click', function(){
  const c=document.getElementById('newClient').value.trim();
  const a=document.getElementById('newAction').value.trim();
  const d=document.getElementById('newDate').value;
  const p=document.getElementById('newPriority').value;
  if(!c||!a){alert('Inserisci cliente e azione.');return;}
  tasks.unshift({id:nextId++,client:c,action:a,date:d||new Date().toISOString().split('T')[0],priority:p});
  save();
  document.getElementById('addOverlay').classList.remove('open');
  render();
});

document.getElementById('cancelBtn').addEventListener('click', function(){
  document.getElementById('addOverlay').classList.remove('open');
});

// topbar nuovo
document.querySelector('.topbar-btn').addEventListener('click', function(){
  if(this.id==='emailBtn') return; // già gestito
});

// aggiungi tasto nuovo — riusa topbar btn (ne aggiungiamo uno dedicato via JS)
// apri add con click sul + (btn nuovo non c'è in topbar mobile, usiamo un FAB)
// in realtà il topbar ha solo email — aggiungiamo listener su emailBtn già fatto sopra
// Aggiungiamo apertura sheet da qualsiasi posto
document.getElementById('addOverlay').addEventListener('click', function(e){
  if(e.target===this) this.classList.remove('open');
});

// click fuori chiude conferme
document.getElementById('taskList').addEventListener('click', function(e){
  if(!e.target.closest('.card-wrap.confirming')) closeAllConfirm();
});

// Funzione globale per aprire il form nuovo (usata dal hint se si vuole)
window.openAdd = function(){
  document.getElementById('newClient').value='';
  document.getElementById('newAction').value='';
  document.getElementById('newDate').value='';
  document.getElementById('newPriority').value='p2';
  document.getElementById('addOverlay').classList.add('open');
};

// Il tasto Nuovo è nella topbar come secondo btn — aggiungilo
const topbarBtns = document.querySelector('.topbar-row');
const nuovoBtn = document.createElement('button');
nuovoBtn.className='topbar-btn';
nuovoBtn.style.marginLeft='8px';
nuovoBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><path d="M12 5v14M5 12h14"/></svg> Nuovo`;
nuovoBtn.addEventListener('click', window.openAdd);
document.querySelector('.topbar-row .topbar-btn').after(nuovoBtn);

render();
</script>
</body>
</html>
